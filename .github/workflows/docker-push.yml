name: Push Docker Image to Docker Hub

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  push_to_docker_hub:
    name: Push Docker Image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        id: checkout_code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies and build
        run: npm install --legacy-peer-deps && npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL }}

      - name: Login to Docker Hub
        id: login_docker_hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract branch name
        shell: bash
        run: |
          echo "branch=$(echo ${GITHUB_REF#refs/heads/} | sed 's/\//-/g')" >> $GITHUB_OUTPUT
        id: extract_branch

      - name: Check for version tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "has_version=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_version=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image
        id: build_image
        run: |
          IMAGE_NAME="${{ secrets.DOCKERHUB_USER }}/vitrine3d"
          BRANCH_TAG="${{ steps.extract_branch.outputs.branch }}"

          docker build -f docker/Dockerfile "$GITHUB_WORKSPACE" -t "$IMAGE_NAME:$BRANCH_TAG" --label dockerfile-path="docker/Dockerfile"

          if [ "$BRANCH_TAG" == "main" ]; then
            docker tag "$IMAGE_NAME:$BRANCH_TAG" "$IMAGE_NAME:latest"
          fi

          if [ "${{ steps.version.outputs.has_version }}" == "true" ]; then
            docker tag "$IMAGE_NAME:$BRANCH_TAG" "$IMAGE_NAME:${{ steps.version.outputs.version }}"
          fi

      - name: Push Docker image
        run: |
          IMAGE_NAME="${{ secrets.DOCKERHUB_USER }}/vitrine3d"
          BRANCH_TAG="${{ steps.extract_branch.outputs.branch }}"

          docker push "$IMAGE_NAME:$BRANCH_TAG"

          if [ "$BRANCH_TAG" == "main" ]; then
            docker push "$IMAGE_NAME:latest"
          fi

          if [ "${{ steps.version.outputs.has_version }}" == "true" ]; then
            docker push "$IMAGE_NAME:${{ steps.version.outputs.version }}"
          fi

      - name: Logout from Docker Hub
        run: docker logout

      - name: End
        run: echo "Docker image pushed to Docker Hub successfully"
