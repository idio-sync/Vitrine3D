<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine3D — Admin</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg-deep: #111318;
    --bg-panel: #16181d;
    --bg-surface: #1c1f25;
    --bg-elevated: #22252c;
    --bg-input: #1a1d23;
    --bg-hover: #282b33;
    --bg-active: #2e323b;
    --border-subtle: #24272e;
    --border-default: #2e323a;
    --border-strong: #3a3f49;
    --accent: #5a9e97;
    --accent-hover: #6bb3ab;
    --accent-muted: rgba(90,158,151,0.15);
    --accent-text: #7cc4bc;
    --text-primary: #c8ccd4;
    --text-secondary: #8a8f9a;
    --text-muted: #5c6170;
    --danger: #c45c5c;
    --danger-hover: #d06a6a;
    --warning: #c4a05c;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
    --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
    --radius-sm: 2px;
    --radius-md: 3px;
}

body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 12px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 2px; }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select { font-family: inherit; font-size: 12px; }

/* ── Header ── */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 42px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-subtle);
    position: sticky;
    top: 0;
    z-index: 100;
}

.header-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-secondary);
}

.header-title span { color: var(--accent); }

.header-user {
    font-size: 11px;
    color: var(--text-muted);
}

/* ── Stats Bar ── */
.stats-bar {
    display: flex;
    gap: 1px;
    background: var(--border-subtle);
    border-bottom: 1px solid var(--border-subtle);
}

.stat-card {
    flex: 1;
    background: var(--bg-panel);
    padding: 10px 18px;
    min-width: 120px;
}

.stat-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 3px;
}

.stat-value {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.02em;
}

/* ── Tab Nav ── */
.tab-nav {
    display: flex;
    gap: 0;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-default);
    padding: 0 20px;
}

.tab-btn {
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
    position: relative;
}

.tab-btn:hover:not(:disabled) { color: var(--text-secondary); }

.tab-btn.active {
    color: var(--accent-text);
    border-bottom-color: var(--accent);
}

.tab-btn:disabled {
    cursor: default;
    opacity: 0.4;
}

.tab-btn[data-tooltip] { position: relative; }
.tab-btn[data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    color: var(--text-secondary);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: var(--radius-md);
    white-space: nowrap;
    z-index: 200;
    pointer-events: none;
}

/* ── Tab Content ── */
.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }

/* ── Filter Bar ── */
.filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 14px;
}

.filter-bar select,
.filter-bar input[type="date"],
.filter-bar input[type="text"] {
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    color: var(--text-primary);
    padding: 5px 8px;
    height: 28px;
    outline: none;
    transition: border-color 0.15s;
}

.filter-bar select:focus,
.filter-bar input:focus {
    border-color: var(--accent);
}

.filter-bar select { min-width: 120px; }
.filter-bar input[type="date"] { color-scheme: dark; min-width: 130px; }

.filter-label {
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    user-select: none;
}

.filter-label input[type="checkbox"] { accent-color: var(--accent); }

.filter-spacer { flex: 1; }

/* ── Tables ── */
.table-wrap { overflow-x: auto; }

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11.5px;
}

th {
    text-align: left;
    color: var(--text-muted);
    font-weight: 500;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border-default);
    white-space: nowrap;
}

td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--border-subtle);
    vertical-align: top;
}

tr:last-child td { border-bottom: none; }

.td-mono {
    font-family: var(--font-mono);
    font-size: 11px;
}

.td-muted { color: var(--text-secondary); }
.td-faint { color: var(--text-muted); }

/* ── Badges ── */
.action-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    white-space: nowrap;
}

.badge-upload    { background: rgba(90,158,151,0.15); color: var(--accent-text); }
.badge-delete    { background: rgba(196,92,92,0.15);  color: var(--danger); }
.badge-rename    { background: rgba(196,160,92,0.15); color: var(--warning); }
.badge-regenerate { background: rgba(100,105,120,0.2); color: var(--text-secondary); }
.badge-delete_orphan { background: rgba(196,92,92,0.10); color: #c47a7a; }
.badge-default   { background: var(--bg-elevated); color: var(--text-muted); }

/* Version history in archive rows */
.version-row td { padding: 0 !important; }
.version-detail { padding: 8px 16px; background: var(--bg-elevated); border-radius: 6px; margin: 4px 8px; }
.version-detail summary { cursor: pointer; color: var(--text-secondary); font-size: 0.85em; user-select: none; }
.version-detail summary:hover { color: var(--text-primary); }
.version-list { margin: 8px 0 0; padding: 0; list-style: none; }
.version-item { display: flex; align-items: center; gap: 12px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.85em; }
.version-item:last-child { border-bottom: none; }
.version-date { color: var(--text-secondary); min-width: 140px; }
.version-size { color: var(--text-muted); min-width: 80px; }
.version-actions { margin-left: auto; display: flex; gap: 6px; }
.version-actions a, .version-actions button { font-size: 0.8em; padding: 2px 8px; border-radius: 4px; cursor: pointer; text-decoration: none; }
.version-actions a { background: rgba(90,158,151,0.15); color: var(--accent-text); border: none; }
.version-actions button { background: rgba(196,92,92,0.15); color: var(--danger); border: none; }

/* ── Pagination ── */
.pagination {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    font-size: 11px;
    color: var(--text-muted);
}

.pagination button {
    padding: 4px 12px;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    background: var(--bg-surface);
    color: var(--text-secondary);
    font-size: 11px;
    transition: background 0.15s, border-color 0.15s;
}

.pagination button:hover:not(:disabled) {
    background: var(--bg-hover);
    border-color: var(--border-strong);
    color: var(--text-primary);
}

.pagination button:disabled {
    opacity: 0.35;
    cursor: default;
}

/* ── Disk Usage Bar ── */
.disk-usage {
    margin-bottom: 20px;
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    padding: 14px 16px;
}

.disk-usage-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
}

.disk-usage-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    font-weight: 500;
}

.disk-usage-text {
    font-size: 12px;
    color: var(--text-secondary);
}

.disk-bar-track {
    height: 5px;
    background: var(--bg-elevated);
    border-radius: 3px;
    overflow: hidden;
}

.disk-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s ease;
}

.disk-bar-fill.warn  { background: var(--warning); }
.disk-bar-fill.crit  { background: var(--danger); }

/* ── Orphan Section ── */
.orphan-section { margin-top: 28px; }

.section-heading {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.section-heading.warn { color: var(--warning); }

/* ── Danger Button ── */
.btn-danger {
    padding: 3px 10px;
    font-size: 10px;
    font-weight: 500;
    border: 1px solid rgba(196,92,92,0.3);
    border-radius: var(--radius-sm);
    background: rgba(196,92,92,0.08);
    color: var(--danger);
    transition: background 0.15s, border-color 0.15s;
}

.btn-danger:hover {
    background: rgba(196,92,92,0.18);
    border-color: rgba(196,92,92,0.5);
}

/* ── Empty/Loading states ── */
.state-row td {
    text-align: center;
    padding: 28px;
    color: var(--text-muted);
    font-size: 11px;
}

/* ── Error banner ── */
#error-banner {
    display: none;
    background: rgba(196,92,92,0.12);
    border: 1px solid rgba(196,92,92,0.3);
    color: var(--danger);
    padding: 10px 20px;
    font-size: 11px;
    text-align: center;
}

/* ── Responsive ── */
@media (max-width: 640px) {
    .stats-bar { flex-direction: column; gap: 0; }
    .stat-card { padding: 8px 16px; }
    .filter-bar { gap: 6px; }
}
/* Settings tab — layout */
.settings-layout {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 0;
    min-height: 400px;
}

.settings-nav {
    position: sticky;
    top: 42px;
    align-self: start;
    padding: 8px 0;
    border-right: 1px solid var(--border-subtle);
}

.settings-nav-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 14px 7px 12px;
    font-size: 11px;
    color: var(--text-muted);
    border-left: 2px solid transparent;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    user-select: none;
}

.settings-nav-item:hover {
    color: var(--text-secondary);
    background: var(--bg-hover);
}

.settings-nav-item.active {
    color: var(--accent-text);
    border-left-color: var(--accent);
    background: var(--accent-muted);
}

.settings-nav-badge {
    font-size: 9px;
    font-weight: 600;
    min-width: 16px;
    height: 16px;
    line-height: 16px;
    text-align: center;
    border-radius: 8px;
    background: var(--accent);
    color: var(--bg-deep);
    display: none;
}

.settings-nav-badge.visible { display: inline-block; }

.settings-main {
    padding: 4px 0 0 24px;
    overflow-y: auto;
}

/* Settings tab — group cards */
.settings-group {
    margin-bottom: 28px;
    scroll-margin-top: 56px;
}

.settings-group-header {
    margin-bottom: 16px;
}

.settings-group-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    margin-bottom: 3px;
}

.settings-group-desc {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.45;
}

.settings-group-body {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    overflow: hidden;
}

/* Settings tab — rows */
.setting-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 11px 14px;
}

.setting-row + .setting-row {
    border-top: 1px solid var(--border-subtle);
}

.setting-label-col { min-width: 0; }

.setting-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 6px;
}

.setting-modified-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    display: none;
}

.setting-modified-dot.visible { display: inline-block; }

.setting-desc {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
}

.setting-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 2px;
}

.setting-default {
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--font-mono);
}

.setting-range {
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--font-mono);
}

/* Settings tab — inputs */
.setting-input-col {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
}

.setting-input-col input[type="number"],
.setting-input-col select {
    width: 130px;
    padding: 5px 8px;
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 12px;
    font-family: var(--font-mono);
    transition: border-color 0.15s, background 0.15s;
}

.setting-input-col input:focus,
.setting-input-col select:focus {
    outline: none;
    border-color: var(--accent);
}

.setting-input-col input.modified,
.setting-input-col select.modified {
    border-color: var(--accent);
    background: var(--accent-muted);
}

.setting-unit {
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    min-width: 20px;
}

.btn-reset-setting {
    background: none;
    border: 1px solid var(--border-subtle);
    color: var(--text-muted);
    cursor: pointer;
    padding: 3px 6px;
    border-radius: var(--radius-sm);
    font-size: 11px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s, border-color 0.15s;
    pointer-events: none;
}

.btn-reset-setting.visible {
    opacity: 1;
    pointer-events: auto;
}

.btn-reset-setting:hover {
    color: var(--text-primary);
    border-color: var(--border-default);
}

.gpu-info-banner {
    padding: 8px 12px;
    margin-bottom: 12px;
    border-radius: 6px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-secondary);
}
.gpu-status { font-size: 10px; margin-right: 4px; }
.gpu-ok { color: #22c55e; }
.gpu-none { color: var(--text-tertiary); }

/* Settings tab — sticky save bar */
.settings-actions {
    position: sticky;
    bottom: 0;
    padding: 12px 0 12px 24px;
    background: var(--bg-deep);
    border-top: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 10;
}

.btn-save-settings {
    padding: 6px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.03em;
    background: var(--accent);
    color: var(--bg-deep);
    border-radius: var(--radius-sm);
    transition: background 0.15s;
}

.btn-save-settings:hover { background: var(--accent-hover); }

.settings-status { font-size: 11px; color: var(--accent-text); }

/* Settings — responsive */
@media (max-width: 640px) {
    .settings-layout {
        grid-template-columns: 1fr;
    }
    .settings-nav {
        position: static;
        display: flex;
        overflow-x: auto;
        border-right: none;
        border-bottom: 1px solid var(--border-subtle);
        padding: 0;
        gap: 0;
    }
    .settings-nav-item {
        border-left: none;
        border-bottom: 2px solid transparent;
        white-space: nowrap;
        padding: 8px 12px;
    }
    .settings-nav-item.active {
        border-left-color: transparent;
        border-bottom-color: var(--accent);
    }
    .settings-main { padding: 16px 0 0 0; }
    .settings-actions { padding-left: 0; }
}
</style>
</head>
<body>

<div id="error-banner"></div>

<!-- Header -->
<header class="header">
    <div class="header-title"><span>Vitrine</span>3D &mdash; Admin</div>
    <div class="header-user" id="user-email">Loading&hellip;</div>
</header>

<!-- Stats Bar -->
<div class="stats-bar">
    <div class="stat-card">
        <div class="stat-label">Archives</div>
        <div class="stat-value" id="stat-archives">&mdash;</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Storage Used</div>
        <div class="stat-value" id="stat-storage">&mdash;</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Last Activity</div>
        <div class="stat-value" id="stat-activity">&mdash;</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Database</div>
        <div class="stat-value" id="stat-db">&mdash;</div>
    </div>
</div>

<!-- Tab Nav -->
<nav class="tab-nav">
    <button class="tab-btn active" data-tab="activity">Activity</button>
    <button class="tab-btn" data-tab="storage">Storage</button>
    <button class="tab-btn" disabled data-tooltip="Coming soon">System</button>
    <button class="tab-btn" data-tab="settings">Settings</button>
</nav>

<!-- Activity Tab -->
<div id="tab-activity" class="tab-content active">
    <div class="filter-bar">
        <select id="filter-action">
            <option value="">All actions</option>
        </select>
        <select id="filter-actor">
            <option value="">All users</option>
        </select>
        <input type="date" id="filter-from" title="From date">
        <input type="date" id="filter-to" title="To date">
        <label class="filter-label">
            <input type="checkbox" id="auto-refresh" checked>
            Auto-refresh
        </label>
    </div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>User</th>
                    <th>Action</th>
                    <th>Target</th>
                    <th>Details</th>
                    <th>IP</th>
                </tr>
            </thead>
            <tbody id="activity-tbody">
                <tr class="state-row"><td colspan="6">Loading&hellip;</td></tr>
            </tbody>
        </table>
    </div>
    <div class="pagination">
        <button id="page-prev" disabled>Previous</button>
        <span id="page-info">&mdash;</span>
        <button id="page-next" disabled>Next</button>
    </div>
</div>

<!-- Storage Tab -->
<div id="tab-storage" class="tab-content">
    <!-- Disk usage bar -->
    <div class="disk-usage">
        <div class="disk-usage-header">
            <span class="disk-usage-label">Disk Usage</span>
            <span class="disk-usage-text" id="disk-text">Loading&hellip;</span>
        </div>
        <div class="disk-bar-track">
            <div class="disk-bar-fill" id="disk-bar" style="width:0%"></div>
        </div>
    </div>

    <!-- Archive table -->
    <div class="section-heading">Archives</div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Filename</th>
                    <th>Size</th>
                    <th>Assets</th>
                    <th>Created</th>
                </tr>
            </thead>
            <tbody id="storage-tbody">
                <tr class="state-row"><td colspan="4">Loading&hellip;</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Orphan section -->
    <div class="orphan-section" id="orphan-section" style="display:none">
        <div class="section-heading warn">Orphaned Files</div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Filename</th>
                        <th>Size</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="orphan-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Settings Tab -->
<div id="tab-settings" class="tab-content">
    <div class="settings-layout">
        <nav class="settings-nav" id="settings-nav"></nav>
        <div class="settings-main">
            <div id="settings-container">
                <div class="state-row" style="padding:20px;color:var(--text-secondary)">Loading settings&hellip;</div>
            </div>
        </div>
    </div>
    <div class="settings-actions" id="settings-actions" style="display:none">
        <button class="btn-save-settings" id="btn-save-settings">Save Changes</button>
        <span class="settings-status" id="settings-status"></span>
    </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const PAGE_SIZE = 50;
let activityOffset = 0;
let activityTotal = 0;
let csrfToken = '';
let autoRefreshTimer = null;
let storageLoaded = false;
let settingsLoaded = false;
let settingsData = {};

// ── Helpers ────────────────────────────────────────────────────────────────
function formatBytes(bytes) {
    if (bytes == null || isNaN(bytes)) return 'N/A';
    if (bytes === 0) return '0 B';
    const units = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(bytes) / Math.log(1024));
    const v = bytes / Math.pow(1024, i);
    return v.toFixed(i >= 2 ? 1 : 0) + ' ' + units[i];
}

function timeAgo(iso) {
    if (!iso) return '—';
    const diff = Date.now() - new Date(iso).getTime();
    if (isNaN(diff)) return '—';
    const abs = Math.abs(diff);
    const s = Math.floor(abs / 1000);
    if (s < 5)   return 'just now';
    if (s < 60)  return s + ' seconds ago';
    const m = Math.floor(s / 60);
    if (m === 1) return '1 minute ago';
    if (m < 60)  return m + ' minutes ago';
    const h = Math.floor(m / 60);
    if (h === 1) return '1 hour ago';
    if (h < 24)  return h + ' hours ago';
    const d = Math.floor(h / 24);
    if (d === 1) return '1 day ago';
    return d + ' days ago';
}

function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function showError(msg) {
    const banner = document.getElementById('error-banner');
    banner.textContent = msg;
    banner.style.display = 'block';
}

function actionBadgeClass(action) {
    const map = {
        upload: 'badge-upload',
        upload_replace: 'badge-upload',
        delete: 'badge-delete',
        delete_version: 'badge-delete',
        rename: 'badge-rename',
        regenerate: 'badge-regenerate',
        delete_orphan: 'badge-delete_orphan',
    };
    return map[action] || 'badge-default';
}

// ── API ────────────────────────────────────────────────────────────────────
async function apiFetch(url) {
    const r = await fetch(url);
    if (!r.ok) throw Object.assign(new Error(r.statusText), { status: r.status });
    return r.json();
}

async function apiDelete(url) {
    const r = await fetch(url, {
        method: 'DELETE',
        headers: { 'X-CSRF-Token': csrfToken },
    });
    if (!r.ok) throw Object.assign(new Error(r.statusText), { status: r.status });
    return r.json();
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
    // Auth check
    try {
        const me = await apiFetch('/api/me');
        document.getElementById('user-email').textContent = me.email || 'Unknown';
    } catch (e) {
        if (e.status === 401) {
            showError('Unauthorized — please log in via Cloudflare Access.');
            document.getElementById('user-email').textContent = 'Unauthorized';
            return;
        }
        showError('Failed to fetch user info: ' + e.message);
        document.getElementById('user-email').textContent = 'Error';
    }

    // CSRF token
    try {
        const t = await apiFetch('/api/csrf-token');
        csrfToken = t.token || '';
    } catch (e) {
        console.warn('CSRF token fetch failed:', e);
    }

    // Stats bar + activity tab in parallel with storage metadata
    const [, storageData] = await Promise.allSettled([
        loadActivityTab(),
        apiFetch('/api/storage'),
    ]);

    if (storageData.status === 'fulfilled') {
        updateStatsFromStorage(storageData.value);
    }

    // Auto-refresh
    setupAutoRefresh();
}

// ── Stats bar ──────────────────────────────────────────────────────────────
function updateStatsFromStorage(data) {
    const archives = data.archives || [];
    const total = archives.reduce((s, a) => s + (a.size || 0), 0);
    document.getElementById('stat-archives').textContent = archives.length;
    document.getElementById('stat-storage').textContent = formatBytes(total);
    document.getElementById('stat-db').textContent = formatBytes(data.dbSize);
}

function updateStatsLastActivity(entries) {
    const el = document.getElementById('stat-activity');
    if (entries && entries.length > 0) {
        el.textContent = timeAgo(entries[0].created_at);
    } else {
        el.textContent = 'Never';
    }
}

// ── Activity Tab ───────────────────────────────────────────────────────────
async function loadActivityTab() {
    const action = document.getElementById('filter-action').value;
    const actor  = document.getElementById('filter-actor').value;
    const from   = document.getElementById('filter-from').value;
    const to     = document.getElementById('filter-to').value;

    const params = new URLSearchParams({
        limit: PAGE_SIZE,
        offset: activityOffset,
    });
    if (action) params.set('action', action);
    if (actor)  params.set('actor', actor);
    if (from)   params.set('from', from);
    if (to)     params.set('to', to);

    const tbody = document.getElementById('activity-tbody');
    tbody.innerHTML = '<tr class="state-row"><td colspan="6">Loading&hellip;</td></tr>';

    try {
        const data = await apiFetch('/api/audit-log?' + params);
        activityTotal = data.total || 0;

        // Populate filter dropdowns on first load (actors/actions from API)
        populateFilterDropdowns(data.actors || [], data.actions || []);

        // Render rows
        const entries = data.entries || [];
        updateStatsLastActivity(entries);

        if (entries.length === 0) {
            tbody.innerHTML = '<tr class="state-row"><td colspan="6">No entries found.</td></tr>';
        } else {
            tbody.innerHTML = entries.map(renderActivityRow).join('');
        }

        // Pagination
        updatePagination();
    } catch (e) {
        tbody.innerHTML = '<tr class="state-row"><td colspan="6">Error: ' + escapeHtml(e.message) + '</td></tr>';
    }
}

function renderActivityRow(e) {
    const iso = e.created_at ? new Date(e.created_at).toISOString() : '';
    const timeDisplay = escapeHtml(timeAgo(e.created_at));
    const badge = actionBadgeClass(e.action);
    const detail = e.detail ? escapeHtml(String(e.detail)) : '<span class="td-faint">—</span>';

    return `<tr>
        <td class="td-mono td-muted" title="${escapeHtml(iso)}">${timeDisplay}</td>
        <td class="td-muted">${escapeHtml(e.actor || '—')}</td>
        <td><span class="action-badge ${badge}">${escapeHtml(e.action || '')}</span></td>
        <td class="td-mono">${escapeHtml(e.target || '—')}</td>
        <td class="td-mono td-muted" style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escapeHtml(typeof e.detail === 'object' ? JSON.stringify(e.detail) : String(e.detail || ''))}">${detail}</td>
        <td class="td-faint">${escapeHtml(e.ip || '—')}</td>
    </tr>`;
}

let filtersPopulated = false;
function populateFilterDropdowns(actors, actions) {
    if (filtersPopulated) return;
    filtersPopulated = true;

    const actionSel = document.getElementById('filter-action');
    const actorSel  = document.getElementById('filter-actor');

    const savedAction = actionSel.value;
    const savedActor  = actorSel.value;

    actions.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a;
        opt.textContent = a;
        actionSel.appendChild(opt);
    });

    actors.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a;
        opt.textContent = a;
        actorSel.appendChild(opt);
    });

    actionSel.value = savedAction;
    actorSel.value  = savedActor;
}

function updatePagination() {
    const start = activityTotal === 0 ? 0 : activityOffset + 1;
    const end   = Math.min(activityOffset + PAGE_SIZE, activityTotal);
    document.getElementById('page-info').textContent =
        activityTotal === 0 ? 'No results' : `${start}–${end} of ${activityTotal}`;
    document.getElementById('page-prev').disabled = activityOffset === 0;
    document.getElementById('page-next').disabled = activityOffset + PAGE_SIZE >= activityTotal;
}

// ── Storage Tab ────────────────────────────────────────────────────────────
async function loadStorageTab() {
    if (storageLoaded) return;
    storageLoaded = true;

    const tbody  = document.getElementById('storage-tbody');
    const diskEl = document.getElementById('disk-text');
    const barEl  = document.getElementById('disk-bar');

    tbody.innerHTML = '<tr class="state-row"><td colspan="4">Loading&hellip;</td></tr>';

    try {
        const data = await apiFetch('/api/storage');
        updateStatsFromStorage(data);

        // Disk usage bar
        const used  = data.totalUsed  || null;
        const free  = data.diskFree   || null;
        const total = data.diskTotal  || null;

        if (total && used != null) {
            const pct = Math.min(100, Math.round((used / total) * 100));
            diskEl.textContent = `${formatBytes(used)} / ${formatBytes(total)} (${pct}%)`;
            barEl.style.width = pct + '%';
            barEl.className = 'disk-bar-fill' +
                (pct >= 95 ? ' crit' : pct >= 80 ? ' warn' : '');
        } else if (used != null) {
            diskEl.textContent = `${formatBytes(used)} used — disk info N/A`;
            barEl.style.width = '0%';
        } else {
            diskEl.textContent = 'N/A';
            barEl.style.width = '0%';
        }

        // Archive table (sorted by size desc)
        const archives = (data.archives || []).slice().sort((a, b) => (b.size || 0) - (a.size || 0));
        if (archives.length === 0) {
            tbody.innerHTML = '<tr class="state-row"><td colspan="4">No archives.</td></tr>';
        } else {
            tbody.innerHTML = archives.map(renderArchiveRow).join('');
        }

        // Orphans
        renderOrphans(data.orphans || []);

    } catch (e) {
        tbody.innerHTML = '<tr class="state-row"><td colspan="4">Error: ' + escapeHtml(e.message) + '</td></tr>';
        diskEl.textContent = 'Error';
    }
}

function renderArchiveRow(a) {
    let assets = '—';
    try {
        const types = typeof a.asset_types === 'string' ? JSON.parse(a.asset_types) : (a.asset_types || []);
        if (Array.isArray(types) && types.length) {
            assets = types.map(t => escapeHtml(typeof t === 'object' ? (t.role || t.type || '?') : String(t))).join(', ');
        }
    } catch (_) { /* ignore */ }

    const created = a.created_at ? new Date(a.created_at).toLocaleDateString() : '—';
    return `<tr>
        <td class="td-mono">${escapeHtml(a.filename || a.hash || '—')}</td>
        <td class="td-muted">${formatBytes(a.size)}</td>
        <td class="td-muted">${assets}</td>
        <td class="td-faint">${escapeHtml(created)}</td>
    </tr>
    <tr class="version-row"><td colspan="4">
        <details class="version-detail" data-hash="${escapeHtml(a.hash)}">
            <summary>Version History</summary>
            <ul class="version-list" data-version-list="${escapeHtml(a.hash)}">
                <li class="version-item" style="color:var(--text-muted)">Click to load&hellip;</li>
            </ul>
        </details>
    </td></tr>`;
}

function renderOrphans(orphans) {
    const section = document.getElementById('orphan-section');
    const tbody   = document.getElementById('orphan-tbody');

    if (!orphans.length) {
        section.style.display = 'none';
        return;
    }

    section.style.display = '';
    tbody.innerHTML = orphans.map(o => `<tr>
        <td class="td-mono">${escapeHtml(o.filename)}</td>
        <td class="td-muted">${formatBytes(o.size)}</td>
        <td><button class="btn-danger btn-delete-orphan" data-filename="${escapeHtml(o.filename)}">Remove</button></td>
    </tr>`).join('');
}

// ── Version History ─────────────────────────────────────────────────────────
document.addEventListener('toggle', async (e) => {
    const details = e.target.closest('.version-detail');
    if (!details || !details.open) return;
    const hash = details.dataset.hash;
    const list = details.querySelector('.version-list');
    if (list.dataset.loaded) return;
    list.dataset.loaded = '1';
    list.innerHTML = '<li class="version-item" style="color:var(--text-muted)">Loading&hellip;</li>';
    try {
        const data = await apiFetch('/api/archives/' + hash + '/versions');
        if (!data.versions || !data.versions.length) {
            list.innerHTML = '<li class="version-item" style="color:var(--text-muted)">No previous versions</li>';
            return;
        }
        list.innerHTML = data.versions.map(v => {
            const date = new Date(v.created_at).toLocaleString();
            return `<li class="version-item">
                <span class="version-date">${escapeHtml(date)}</span>
                <span class="version-size">${formatBytes(v.size)}</span>
                <span class="version-actions">
                    <a href="/api/archives/${escapeHtml(hash)}/versions/${v.id}/download">Download</a>
                    <button data-del-version="${v.id}" data-del-hash="${escapeHtml(hash)}">Delete</button>
                </span>
            </li>`;
        }).join('');
    } catch (err) {
        list.innerHTML = '<li class="version-item" style="color:var(--danger)">Error: ' + escapeHtml(err.message) + '</li>';
    }
}, true);

document.addEventListener('click', async (e) => {
    const delBtn = e.target.closest('[data-del-version]');
    if (delBtn) {
        const vId = delBtn.dataset.delVersion;
        const hash = delBtn.dataset.delHash;
        if (!confirm('Delete this backup version?')) return;
        try {
            await apiDelete('/api/archives/' + hash + '/versions/' + vId);
            // Reload the version list
            const details = delBtn.closest('.version-detail');
            const list = details.querySelector('.version-list');
            delete list.dataset.loaded;
            details.open = false;
            details.open = true;
        } catch (err) {
            alert('Delete failed: ' + err.message);
        }
        return;
    }
});

document.addEventListener('click', async (e) => {
    const btn = e.target.closest('.btn-delete-orphan');
    if (!btn) return;
    const filename = btn.dataset.filename;
    if (!confirm('Delete orphan: ' + filename + '?')) return;
    try {
        await apiDelete('/api/storage/orphans/' + encodeURIComponent(filename));
        storageLoaded = false;
        loadStorageTab();
    } catch (err) {
        alert('Delete failed: ' + err.message);
    }
});

// ── Auto-refresh ───────────────────────────────────────────────────────────
function setupAutoRefresh() {
    const checkbox = document.getElementById('auto-refresh');

    function startTimer() {
        clearInterval(autoRefreshTimer);
        if (checkbox.checked && document.getElementById('tab-activity').classList.contains('active')) {
            autoRefreshTimer = setInterval(loadActivityTab, 30000);
        }
    }

    checkbox.addEventListener('change', startTimer);
    startTimer();
}

// ── Tab switching ──────────────────────────────────────────────────────────
function activateTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === name);
    });
    document.querySelectorAll('.tab-content').forEach(c => {
        c.classList.toggle('active', c.id === 'tab-' + name);
    });

    if (name === 'storage' && !storageLoaded) loadStorageTab();
    if (name === 'settings' && !settingsLoaded) loadSettingsTab();

    // Restart auto-refresh timer based on active tab
    clearInterval(autoRefreshTimer);
    if (name === 'activity' && document.getElementById('auto-refresh').checked) {
        autoRefreshTimer = setInterval(loadActivityTab, 30000);
    }

    history.replaceState(null, '', '#' + name);
}

document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => activateTab(btn.dataset.tab));
});

// ── Filter events ──────────────────────────────────────────────────────────
['filter-action', 'filter-actor', 'filter-from', 'filter-to'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => {
        activityOffset = 0;
        loadActivityTab();
    });
});

document.getElementById('page-prev').addEventListener('click', () => {
    if (activityOffset >= PAGE_SIZE) {
        activityOffset -= PAGE_SIZE;
        loadActivityTab();
    }
});

document.getElementById('page-next').addEventListener('click', () => {
    if (activityOffset + PAGE_SIZE < activityTotal) {
        activityOffset += PAGE_SIZE;
        loadActivityTab();
    }
});

// ── Settings tab ──────────────────────────────────────────────────────────

async function loadSettingsTab() {
    settingsLoaded = true;
    try {
        const res = await fetch('/api/settings');
        if (!res.ok) throw new Error(res.statusText);
        settingsData = await res.json();
        renderSettings();
    } catch (err) {
        document.getElementById('settings-container').innerHTML =
            '<div class="state-row" style="padding:20px;color:var(--danger)">Failed to load settings: ' + escapeHtml(err.message) + '</div>';
    }
}

// Group descriptions for better UX context
const GROUP_DESCRIPTIONS = {
    'Video Transcode': 'Controls FFmpeg encoding when converting recordings to MP4. Hardware encoding requires /dev/dri GPU passthrough.',
    'Video Recording': 'WebM capture settings for in-browser screen recording.',
    'GIF Generation': 'Output parameters for animated GIF exports.',
    'Media Output': 'Dimensions and quality for generated thumbnails and previews.',
    'Upload': 'Server-side limits for archive file uploads.',
    'Renderer': 'GPU rendering budgets and display scaling caps.',
};

// Group ordering
const GROUP_ORDER = ['Renderer', 'Upload', 'Video Recording', 'Video Transcode', 'GIF Generation', 'Media Output'];

// Unit suffixes extracted from setting keys/labels
function getSettingUnit(s) {
    if (s.key.includes('bitrate') || s.label.includes('bps')) return 'bps';
    if (s.label.includes('(px)')) return 'px';
    if (s.label.includes('(MB)')) return 'MB';
    if (s.label.includes('(s)')) return 's';
    if (s.label.includes('FPS') || s.key.includes('fps') || s.key.includes('framerate')) return 'fps';
    return '';
}

function renderSettings() {
    const container = document.getElementById('settings-container');
    const nav = document.getElementById('settings-nav');
    const groups = {};

    for (const [key, def] of Object.entries(settingsData)) {
        const g = def.group || 'Other';
        if (!groups[g]) groups[g] = [];
        groups[g].push({ key, ...def });
    }

    // Sort groups by defined order
    const sortedGroupNames = Object.keys(groups).sort((a, b) => {
        const ia = GROUP_ORDER.indexOf(a);
        const ib = GROUP_ORDER.indexOf(b);
        return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
    });

    // Build sidebar nav
    let navHtml = '';
    for (const groupName of sortedGroupNames) {
        const groupId = groupName.toLowerCase().replace(/\s+/g, '-');
        const customCount = groups[groupName].filter(s => s.isCustom).length;
        navHtml += '<button class="settings-nav-item" data-group="' + groupId + '">' +
            escapeHtml(groupName) +
            '<span class="settings-nav-badge' + (customCount > 0 ? ' visible' : '') + '" data-group-badge="' + groupId + '">' + customCount + '</span>' +
        '</button>';
    }
    nav.innerHTML = navHtml;

    // Build settings content
    let html = '';
    for (const groupName of sortedGroupNames) {
        const settings = groups[groupName];
        const groupId = groupName.toLowerCase().replace(/\s+/g, '-');
        const desc = GROUP_DESCRIPTIONS[groupName] || '';

        html += '<div class="settings-group" id="sg-' + groupId + '">';
        html += '<div class="settings-group-header">';
        html += '<div class="settings-group-title">' + escapeHtml(groupName) + '</div>';
        if (desc) html += '<div class="settings-group-desc">' + escapeHtml(desc) + '</div>';
        html += '</div>';
        html += '<div class="settings-group-body">';
        for (const s of settings) {
            html += renderSettingRow(s);
        }
        html += '</div></div>';
    }
    container.innerHTML = html;

    // Fetch GPU capabilities and show info banner in Video Transcode group
    fetch('/api/gpu').then(r => r.json()).then(gpu => {
        const vtGroup = document.getElementById('sg-video-transcode');
        if (!vtGroup) return;
        const header = vtGroup.querySelector('.settings-group-header');
        const banner = document.createElement('div');
        banner.className = 'gpu-info-banner';
        if (gpu.vaapi) {
            banner.innerHTML = '<span class="gpu-status gpu-ok">&#9679;</span> ' +
                '<strong>GPU:</strong> ' + escapeHtml(gpu.device) +
                ' &mdash; ' + gpu.encoders.filter(e => e !== 'libx264').join(', ');
        } else {
            banner.innerHTML = '<span class="gpu-status gpu-none">&#9679;</span> ' +
                'No GPU detected &mdash; software encoding only';
        }
        header.after(banner);
    }).catch(() => {});

    document.getElementById('settings-actions').style.display = 'flex';

    // Wire reset buttons
    container.querySelectorAll('.btn-reset-setting').forEach(btn => {
        btn.addEventListener('click', () => resetSetting(btn.dataset.key));
    });

    // Wire input change tracking
    container.querySelectorAll('input, select').forEach(el => {
        el.addEventListener('input', () => {
            const key = el.dataset.key;
            const def = settingsData[key];
            const isModified = el.value !== def.value;
            el.classList.toggle('modified', isModified);
            // Update the modified dot
            const dot = el.closest('.setting-row').querySelector('.setting-modified-dot');
            if (dot) dot.classList.toggle('visible', isModified || def.isCustom);
        });
    });

    // Wire sidebar nav — scroll to group
    nav.querySelectorAll('.settings-nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
            const target = document.getElementById('sg-' + btn.dataset.group);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
    });

    // Activate first nav item
    const firstNav = nav.querySelector('.settings-nav-item');
    if (firstNav) firstNav.classList.add('active');

    // Scroll-spy: highlight nav item for visible group
    setupSettingsScrollSpy();
}

function setupSettingsScrollSpy() {
    const groups = document.querySelectorAll('.settings-group');
    const navItems = document.querySelectorAll('.settings-nav-item');
    if (!groups.length) return;

    const observer = new IntersectionObserver((entries) => {
        for (const entry of entries) {
            if (entry.isIntersecting) {
                const id = entry.target.id.replace('sg-', '');
                navItems.forEach(n => n.classList.toggle('active', n.dataset.group === id));
            }
        }
    }, { rootMargin: '-60px 0px -60% 0px', threshold: 0 });

    groups.forEach(g => observer.observe(g));
}

function renderSettingRow(s) {
    const unit = getSettingUnit(s);
    let inputHtml = '';
    if (s.type === 'select') {
        inputHtml = '<select data-key="' + s.key + '">';
        for (const opt of (s.options || [])) {
            const sel = opt === s.value ? ' selected' : '';
            inputHtml += '<option value="' + escapeHtml(opt) + '"' + sel + '>' + escapeHtml(opt) + '</option>';
        }
        inputHtml += '</select>';
    } else {
        let attrs = 'type="number" value="' + escapeHtml(s.value) + '"';
        if (s.min !== undefined) attrs += ' min="' + s.min + '"';
        if (s.max !== undefined) attrs += ' max="' + s.max + '"';
        inputHtml = '<input data-key="' + s.key + '" ' + attrs + '>';
    }

    if (unit) inputHtml += '<span class="setting-unit">' + escapeHtml(unit) + '</span>';

    const resetVisible = s.isCustom ? ' visible' : '';
    const dotVisible = s.isCustom ? ' visible' : '';
    const desc = s.description ? '<div class="setting-desc">' + escapeHtml(s.description) + '</div>' : '';

    // Build meta line: default + range
    let metaHtml = '<div class="setting-meta">';
    metaHtml += '<span class="setting-default">default: ' + escapeHtml(String(s.default)) + '</span>';
    if (s.min !== undefined && s.max !== undefined) {
        metaHtml += '<span class="setting-range">' + s.min + '–' + s.max + '</span>';
    } else if (s.min !== undefined) {
        metaHtml += '<span class="setting-range">min ' + s.min + '</span>';
    }
    metaHtml += '</div>';

    // Clean label: remove unit suffixes already shown as unit badges
    let cleanLabel = s.label.replace(/\s*\([^)]*\)\s*$/, '');

    return '<div class="setting-row">' +
        '<div class="setting-label-col">' +
            '<div class="setting-label">' +
                '<span class="setting-modified-dot' + dotVisible + '"></span>' +
                escapeHtml(cleanLabel) +
            '</div>' +
            desc +
            metaHtml +
        '</div>' +
        '<div class="setting-input-col">' +
            inputHtml +
            '<button class="btn-reset-setting' + resetVisible + '" data-key="' + s.key + '" title="Reset to default">&#8635;</button>' +
        '</div>' +
    '</div>';
}

async function resetSetting(key) {
    try {
        const res = await fetch('/api/settings/' + encodeURIComponent(key), {
            method: 'DELETE',
            headers: { 'x-csrf-token': csrfToken }
        });
        if (!res.ok) throw new Error((await res.json()).error || res.statusText);
        settingsLoaded = false;
        loadSettingsTab();
        showSettingsStatus('Reset to default');
    } catch (err) {
        showSettingsStatus('Error: ' + err.message, true);
    }
}

document.getElementById('btn-save-settings').addEventListener('click', async () => {
    const updates = {};
    document.querySelectorAll('#settings-container input, #settings-container select').forEach(el => {
        const key = el.dataset.key;
        if (el.value !== settingsData[key].value) {
            updates[key] = el.value;
        }
    });

    if (Object.keys(updates).length === 0) {
        showSettingsStatus('No changes to save');
        return;
    }

    try {
        const res = await fetch('/api/settings', {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'x-csrf-token': csrfToken
            },
            body: JSON.stringify(updates)
        });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.details ? err.details.join(', ') : err.error);
        }
        settingsData = await res.json();
        renderSettings();
        showSettingsStatus('Settings saved');
    } catch (err) {
        showSettingsStatus('Error: ' + err.message, true);
    }
});

function showSettingsStatus(msg, isError) {
    const el = document.getElementById('settings-status');
    el.textContent = msg;
    el.style.color = isError ? 'var(--danger)' : 'var(--accent-text)';
    setTimeout(() => { el.textContent = ''; }, 3000);
}

// ── Boot ───────────────────────────────────────────────────────────────────
// Restore tab from hash
(function restoreTab() {
    const hash = location.hash.replace('#', '');
    const valid = ['activity', 'storage', 'settings'];
    if (valid.includes(hash)) activateTab(hash);
})();

init();
</script>
</body>
</html>
