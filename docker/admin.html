<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine3D — Admin</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg-deep: #111318;
    --bg-panel: #16181d;
    --bg-surface: #1c1f25;
    --bg-elevated: #22252c;
    --bg-input: #1a1d23;
    --bg-hover: #282b33;
    --bg-active: #2e323b;
    --border-subtle: #24272e;
    --border-default: #2e323a;
    --border-strong: #3a3f49;
    --accent: #5a9e97;
    --accent-hover: #6bb3ab;
    --accent-muted: rgba(90,158,151,0.15);
    --accent-text: #7cc4bc;
    --text-primary: #c8ccd4;
    --text-secondary: #8a8f9a;
    --text-muted: #5c6170;
    --danger: #c45c5c;
    --danger-hover: #d06a6a;
    --warning: #c4a05c;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
    --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
    --radius-sm: 2px;
    --radius-md: 3px;
}

body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 12px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 2px; }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select { font-family: inherit; font-size: 12px; }

/* ── Header ── */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 42px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-subtle);
    position: sticky;
    top: 0;
    z-index: 100;
}

.header-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-secondary);
}

.header-title span { color: var(--accent); }

.header-user {
    font-size: 11px;
    color: var(--text-muted);
}

/* ── Stats Bar ── */
.stats-bar {
    display: flex;
    gap: 1px;
    background: var(--border-subtle);
    border-bottom: 1px solid var(--border-subtle);
}

.stat-card {
    flex: 1;
    background: var(--bg-panel);
    padding: 10px 18px;
    min-width: 120px;
}

.stat-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 3px;
}

.stat-value {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.02em;
}

/* ── Tab Nav ── */
.tab-nav {
    display: flex;
    gap: 0;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-default);
    padding: 0 20px;
}

.tab-btn {
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
    position: relative;
}

.tab-btn:hover:not(:disabled) { color: var(--text-secondary); }

.tab-btn.active {
    color: var(--accent-text);
    border-bottom-color: var(--accent);
}

.tab-btn:disabled {
    cursor: default;
    opacity: 0.4;
}

.tab-btn[data-tooltip] { position: relative; }
.tab-btn[data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    color: var(--text-secondary);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: var(--radius-md);
    white-space: nowrap;
    z-index: 200;
    pointer-events: none;
}

/* ── Tab Content ── */
.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }

/* ── Filter Bar ── */
.filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 14px;
}

.filter-bar select,
.filter-bar input[type="date"],
.filter-bar input[type="text"] {
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    color: var(--text-primary);
    padding: 5px 8px;
    height: 28px;
    outline: none;
    transition: border-color 0.15s;
}

.filter-bar select:focus,
.filter-bar input:focus {
    border-color: var(--accent);
}

.filter-bar select { min-width: 120px; }
.filter-bar input[type="date"] { color-scheme: dark; min-width: 130px; }

.filter-label {
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    user-select: none;
}

.filter-label input[type="checkbox"] { accent-color: var(--accent); }

.filter-spacer { flex: 1; }

/* ── Tables ── */
.table-wrap { overflow-x: auto; }

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11.5px;
}

th {
    text-align: left;
    color: var(--text-muted);
    font-weight: 500;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border-default);
    white-space: nowrap;
}

td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--border-subtle);
    vertical-align: top;
}

tr:last-child td { border-bottom: none; }

.td-mono {
    font-family: var(--font-mono);
    font-size: 11px;
}

.td-muted { color: var(--text-secondary); }
.td-faint { color: var(--text-muted); }

/* ── Badges ── */
.action-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    white-space: nowrap;
}

.badge-upload    { background: rgba(90,158,151,0.15); color: var(--accent-text); }
.badge-delete    { background: rgba(196,92,92,0.15);  color: var(--danger); }
.badge-rename    { background: rgba(196,160,92,0.15); color: var(--warning); }
.badge-regenerate { background: rgba(100,105,120,0.2); color: var(--text-secondary); }
.badge-delete_orphan { background: rgba(196,92,92,0.10); color: #c47a7a; }
.badge-default   { background: var(--bg-elevated); color: var(--text-muted); }

/* ── Pagination ── */
.pagination {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    font-size: 11px;
    color: var(--text-muted);
}

.pagination button {
    padding: 4px 12px;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    background: var(--bg-surface);
    color: var(--text-secondary);
    font-size: 11px;
    transition: background 0.15s, border-color 0.15s;
}

.pagination button:hover:not(:disabled) {
    background: var(--bg-hover);
    border-color: var(--border-strong);
    color: var(--text-primary);
}

.pagination button:disabled {
    opacity: 0.35;
    cursor: default;
}

/* ── Disk Usage Bar ── */
.disk-usage {
    margin-bottom: 20px;
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    padding: 14px 16px;
}

.disk-usage-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
}

.disk-usage-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    font-weight: 500;
}

.disk-usage-text {
    font-size: 12px;
    color: var(--text-secondary);
}

.disk-bar-track {
    height: 5px;
    background: var(--bg-elevated);
    border-radius: 3px;
    overflow: hidden;
}

.disk-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s ease;
}

.disk-bar-fill.warn  { background: var(--warning); }
.disk-bar-fill.crit  { background: var(--danger); }

/* ── Orphan Section ── */
.orphan-section { margin-top: 28px; }

.section-heading {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.section-heading.warn { color: var(--warning); }

/* ── Danger Button ── */
.btn-danger {
    padding: 3px 10px;
    font-size: 10px;
    font-weight: 500;
    border: 1px solid rgba(196,92,92,0.3);
    border-radius: var(--radius-sm);
    background: rgba(196,92,92,0.08);
    color: var(--danger);
    transition: background 0.15s, border-color 0.15s;
}

.btn-danger:hover {
    background: rgba(196,92,92,0.18);
    border-color: rgba(196,92,92,0.5);
}

/* ── Empty/Loading states ── */
.state-row td {
    text-align: center;
    padding: 28px;
    color: var(--text-muted);
    font-size: 11px;
}

/* ── Error banner ── */
#error-banner {
    display: none;
    background: rgba(196,92,92,0.12);
    border: 1px solid rgba(196,92,92,0.3);
    color: var(--danger);
    padding: 10px 20px;
    font-size: 11px;
    text-align: center;
}

/* ── Responsive ── */
@media (max-width: 640px) {
    .stats-bar { flex-direction: column; gap: 0; }
    .stat-card { padding: 8px 16px; }
    .filter-bar { gap: 6px; }
}
</style>
</head>
<body>

<div id="error-banner"></div>

<!-- Header -->
<header class="header">
    <div class="header-title"><span>Vitrine</span>3D &mdash; Admin</div>
    <div class="header-user" id="user-email">Loading&hellip;</div>
</header>

<!-- Stats Bar -->
<div class="stats-bar">
    <div class="stat-card">
        <div class="stat-label">Archives</div>
        <div class="stat-value" id="stat-archives">&mdash;</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Storage Used</div>
        <div class="stat-value" id="stat-storage">&mdash;</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Last Activity</div>
        <div class="stat-value" id="stat-activity">&mdash;</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Database</div>
        <div class="stat-value" id="stat-db">&mdash;</div>
    </div>
</div>

<!-- Tab Nav -->
<nav class="tab-nav">
    <button class="tab-btn active" data-tab="activity">Activity</button>
    <button class="tab-btn" data-tab="storage">Storage</button>
    <button class="tab-btn" disabled data-tooltip="Coming soon">System</button>
    <button class="tab-btn" disabled data-tooltip="Coming soon">Settings</button>
</nav>

<!-- Activity Tab -->
<div id="tab-activity" class="tab-content active">
    <div class="filter-bar">
        <select id="filter-action">
            <option value="">All actions</option>
        </select>
        <select id="filter-actor">
            <option value="">All users</option>
        </select>
        <input type="date" id="filter-from" title="From date">
        <input type="date" id="filter-to" title="To date">
        <label class="filter-label">
            <input type="checkbox" id="auto-refresh" checked>
            Auto-refresh
        </label>
    </div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>User</th>
                    <th>Action</th>
                    <th>Target</th>
                    <th>Details</th>
                    <th>IP</th>
                </tr>
            </thead>
            <tbody id="activity-tbody">
                <tr class="state-row"><td colspan="6">Loading&hellip;</td></tr>
            </tbody>
        </table>
    </div>
    <div class="pagination">
        <button id="page-prev" disabled>Previous</button>
        <span id="page-info">&mdash;</span>
        <button id="page-next" disabled>Next</button>
    </div>
</div>

<!-- Storage Tab -->
<div id="tab-storage" class="tab-content">
    <!-- Disk usage bar -->
    <div class="disk-usage">
        <div class="disk-usage-header">
            <span class="disk-usage-label">Disk Usage</span>
            <span class="disk-usage-text" id="disk-text">Loading&hellip;</span>
        </div>
        <div class="disk-bar-track">
            <div class="disk-bar-fill" id="disk-bar" style="width:0%"></div>
        </div>
    </div>

    <!-- Archive table -->
    <div class="section-heading">Archives</div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Filename</th>
                    <th>Size</th>
                    <th>Assets</th>
                    <th>Created</th>
                </tr>
            </thead>
            <tbody id="storage-tbody">
                <tr class="state-row"><td colspan="4">Loading&hellip;</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Orphan section -->
    <div class="orphan-section" id="orphan-section" style="display:none">
        <div class="section-heading warn">Orphaned Files</div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Filename</th>
                        <th>Size</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="orphan-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const PAGE_SIZE = 50;
let activityOffset = 0;
let activityTotal = 0;
let csrfToken = '';
let autoRefreshTimer = null;
let storageLoaded = false;

// ── Helpers ────────────────────────────────────────────────────────────────
function formatBytes(bytes) {
    if (bytes == null || isNaN(bytes)) return 'N/A';
    if (bytes === 0) return '0 B';
    const units = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(bytes) / Math.log(1024));
    const v = bytes / Math.pow(1024, i);
    return v.toFixed(i >= 2 ? 1 : 0) + ' ' + units[i];
}

function timeAgo(iso) {
    if (!iso) return '—';
    const diff = Date.now() - new Date(iso).getTime();
    if (isNaN(diff)) return '—';
    const s = Math.floor(diff / 1000);
    if (s < 60)  return s + 's ago';
    const m = Math.floor(s / 60);
    if (m < 60)  return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24)  return h + 'h ago';
    const d = Math.floor(h / 24);
    return d + 'd ago';
}

function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function showError(msg) {
    const banner = document.getElementById('error-banner');
    banner.textContent = msg;
    banner.style.display = 'block';
}

function actionBadgeClass(action) {
    const map = {
        upload: 'badge-upload',
        delete: 'badge-delete',
        rename: 'badge-rename',
        regenerate: 'badge-regenerate',
        delete_orphan: 'badge-delete_orphan',
    };
    return map[action] || 'badge-default';
}

// ── API ────────────────────────────────────────────────────────────────────
async function apiFetch(url) {
    const r = await fetch(url);
    if (!r.ok) throw Object.assign(new Error(r.statusText), { status: r.status });
    return r.json();
}

async function apiDelete(url) {
    const r = await fetch(url, {
        method: 'DELETE',
        headers: { 'X-CSRF-Token': csrfToken },
    });
    if (!r.ok) throw Object.assign(new Error(r.statusText), { status: r.status });
    return r.json();
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
    // Auth check
    try {
        const me = await apiFetch('/api/me');
        document.getElementById('user-email').textContent = me.email || 'Unknown';
    } catch (e) {
        if (e.status === 401) {
            showError('Unauthorized — please log in via Cloudflare Access.');
            document.getElementById('user-email').textContent = 'Unauthorized';
            return;
        }
        showError('Failed to fetch user info: ' + e.message);
        document.getElementById('user-email').textContent = 'Error';
    }

    // CSRF token
    try {
        const t = await apiFetch('/api/csrf-token');
        csrfToken = t.token || '';
    } catch (e) {
        console.warn('CSRF token fetch failed:', e);
    }

    // Stats bar + activity tab in parallel with storage metadata
    const [, storageData] = await Promise.allSettled([
        loadActivityTab(),
        apiFetch('/api/storage'),
    ]);

    if (storageData.status === 'fulfilled') {
        updateStatsFromStorage(storageData.value);
    }

    // Auto-refresh
    setupAutoRefresh();
}

// ── Stats bar ──────────────────────────────────────────────────────────────
function updateStatsFromStorage(data) {
    const archives = data.archives || [];
    const total = archives.reduce((s, a) => s + (a.size || 0), 0);
    document.getElementById('stat-archives').textContent = archives.length;
    document.getElementById('stat-storage').textContent = formatBytes(total);
    document.getElementById('stat-db').textContent = formatBytes(data.dbSize);
}

function updateStatsLastActivity(entries) {
    const el = document.getElementById('stat-activity');
    if (entries && entries.length > 0) {
        el.textContent = timeAgo(entries[0].created_at);
    } else {
        el.textContent = 'Never';
    }
}

// ── Activity Tab ───────────────────────────────────────────────────────────
async function loadActivityTab() {
    const action = document.getElementById('filter-action').value;
    const actor  = document.getElementById('filter-actor').value;
    const from   = document.getElementById('filter-from').value;
    const to     = document.getElementById('filter-to').value;

    const params = new URLSearchParams({
        limit: PAGE_SIZE,
        offset: activityOffset,
    });
    if (action) params.set('action', action);
    if (actor)  params.set('actor', actor);
    if (from)   params.set('from', from);
    if (to)     params.set('to', to);

    const tbody = document.getElementById('activity-tbody');
    tbody.innerHTML = '<tr class="state-row"><td colspan="6">Loading&hellip;</td></tr>';

    try {
        const data = await apiFetch('/api/audit-log?' + params);
        activityTotal = data.total || 0;

        // Populate filter dropdowns on first load (actors/actions from API)
        populateFilterDropdowns(data.actors || [], data.actions || []);

        // Render rows
        const entries = data.entries || [];
        updateStatsLastActivity(entries);

        if (entries.length === 0) {
            tbody.innerHTML = '<tr class="state-row"><td colspan="6">No entries found.</td></tr>';
        } else {
            tbody.innerHTML = entries.map(renderActivityRow).join('');
        }

        // Pagination
        updatePagination();
    } catch (e) {
        tbody.innerHTML = '<tr class="state-row"><td colspan="6">Error: ' + escapeHtml(e.message) + '</td></tr>';
    }
}

function renderActivityRow(e) {
    const iso = e.created_at ? new Date(e.created_at).toISOString() : '';
    const timeDisplay = escapeHtml(timeAgo(e.created_at));
    const badge = actionBadgeClass(e.action);
    const detail = e.detail ? escapeHtml(String(e.detail)) : '<span class="td-faint">—</span>';

    return `<tr>
        <td class="td-mono td-muted" title="${escapeHtml(iso)}">${timeDisplay}</td>
        <td class="td-muted">${escapeHtml(e.actor || '—')}</td>
        <td><span class="action-badge ${badge}">${escapeHtml(e.action || '')}</span></td>
        <td class="td-mono">${escapeHtml(e.target || '—')}</td>
        <td class="td-mono td-muted" style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escapeHtml(typeof e.detail === 'object' ? JSON.stringify(e.detail) : String(e.detail || ''))}">${detail}</td>
        <td class="td-faint">${escapeHtml(e.ip || '—')}</td>
    </tr>`;
}

let filtersPopulated = false;
function populateFilterDropdowns(actors, actions) {
    if (filtersPopulated) return;
    filtersPopulated = true;

    const actionSel = document.getElementById('filter-action');
    const actorSel  = document.getElementById('filter-actor');

    const savedAction = actionSel.value;
    const savedActor  = actorSel.value;

    actions.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a;
        opt.textContent = a;
        actionSel.appendChild(opt);
    });

    actors.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a;
        opt.textContent = a;
        actorSel.appendChild(opt);
    });

    actionSel.value = savedAction;
    actorSel.value  = savedActor;
}

function updatePagination() {
    const start = activityTotal === 0 ? 0 : activityOffset + 1;
    const end   = Math.min(activityOffset + PAGE_SIZE, activityTotal);
    document.getElementById('page-info').textContent =
        activityTotal === 0 ? 'No results' : `${start}–${end} of ${activityTotal}`;
    document.getElementById('page-prev').disabled = activityOffset === 0;
    document.getElementById('page-next').disabled = activityOffset + PAGE_SIZE >= activityTotal;
}

// ── Storage Tab ────────────────────────────────────────────────────────────
async function loadStorageTab() {
    if (storageLoaded) return;
    storageLoaded = true;

    const tbody  = document.getElementById('storage-tbody');
    const diskEl = document.getElementById('disk-text');
    const barEl  = document.getElementById('disk-bar');

    tbody.innerHTML = '<tr class="state-row"><td colspan="4">Loading&hellip;</td></tr>';

    try {
        const data = await apiFetch('/api/storage');
        updateStatsFromStorage(data);

        // Disk usage bar
        const used  = data.totalUsed  || null;
        const free  = data.diskFree   || null;
        const total = data.diskTotal  || null;

        if (total && used != null) {
            const pct = Math.min(100, Math.round((used / total) * 100));
            diskEl.textContent = `${formatBytes(used)} / ${formatBytes(total)} (${pct}%)`;
            barEl.style.width = pct + '%';
            barEl.className = 'disk-bar-fill' +
                (pct >= 95 ? ' crit' : pct >= 80 ? ' warn' : '');
        } else if (used != null) {
            diskEl.textContent = `${formatBytes(used)} used — disk info N/A`;
            barEl.style.width = '0%';
        } else {
            diskEl.textContent = 'N/A';
            barEl.style.width = '0%';
        }

        // Archive table (sorted by size desc)
        const archives = (data.archives || []).slice().sort((a, b) => (b.size || 0) - (a.size || 0));
        if (archives.length === 0) {
            tbody.innerHTML = '<tr class="state-row"><td colspan="4">No archives.</td></tr>';
        } else {
            tbody.innerHTML = archives.map(renderArchiveRow).join('');
        }

        // Orphans
        renderOrphans(data.orphans || []);

    } catch (e) {
        tbody.innerHTML = '<tr class="state-row"><td colspan="4">Error: ' + escapeHtml(e.message) + '</td></tr>';
        diskEl.textContent = 'Error';
    }
}

function renderArchiveRow(a) {
    let assets = '—';
    try {
        const types = typeof a.asset_types === 'string' ? JSON.parse(a.asset_types) : (a.asset_types || []);
        if (Array.isArray(types) && types.length) {
            assets = types.map(t => escapeHtml(typeof t === 'object' ? (t.role || t.type || '?') : String(t))).join(', ');
        }
    } catch (_) { /* ignore */ }

    const created = a.created_at ? new Date(a.created_at).toLocaleDateString() : '—';
    return `<tr>
        <td class="td-mono">${escapeHtml(a.filename || a.hash || '—')}</td>
        <td class="td-muted">${formatBytes(a.size)}</td>
        <td class="td-muted">${assets}</td>
        <td class="td-faint">${escapeHtml(created)}</td>
    </tr>`;
}

function renderOrphans(orphans) {
    const section = document.getElementById('orphan-section');
    const tbody   = document.getElementById('orphan-tbody');

    if (!orphans.length) {
        section.style.display = 'none';
        return;
    }

    section.style.display = '';
    tbody.innerHTML = orphans.map(o => `<tr>
        <td class="td-mono">${escapeHtml(o.filename)}</td>
        <td class="td-muted">${formatBytes(o.size)}</td>
        <td><button class="btn-danger btn-delete-orphan" data-filename="${escapeHtml(o.filename)}">Remove</button></td>
    </tr>`).join('');
}

document.addEventListener('click', async (e) => {
    const btn = e.target.closest('.btn-delete-orphan');
    if (!btn) return;
    const filename = btn.dataset.filename;
    if (!confirm('Delete orphan: ' + filename + '?')) return;
    try {
        await apiDelete('/api/storage/orphans/' + encodeURIComponent(filename));
        storageLoaded = false;
        loadStorageTab();
    } catch (err) {
        alert('Delete failed: ' + err.message);
    }
});

// ── Auto-refresh ───────────────────────────────────────────────────────────
function setupAutoRefresh() {
    const checkbox = document.getElementById('auto-refresh');

    function startTimer() {
        clearInterval(autoRefreshTimer);
        if (checkbox.checked && document.getElementById('tab-activity').classList.contains('active')) {
            autoRefreshTimer = setInterval(loadActivityTab, 30000);
        }
    }

    checkbox.addEventListener('change', startTimer);
    startTimer();
}

// ── Tab switching ──────────────────────────────────────────────────────────
function activateTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === name);
    });
    document.querySelectorAll('.tab-content').forEach(c => {
        c.classList.toggle('active', c.id === 'tab-' + name);
    });

    if (name === 'storage' && !storageLoaded) loadStorageTab();

    // Restart auto-refresh timer based on active tab
    clearInterval(autoRefreshTimer);
    if (name === 'activity' && document.getElementById('auto-refresh').checked) {
        autoRefreshTimer = setInterval(loadActivityTab, 30000);
    }

    history.replaceState(null, '', '#' + name);
}

document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => activateTab(btn.dataset.tab));
});

// ── Filter events ──────────────────────────────────────────────────────────
['filter-action', 'filter-actor', 'filter-from', 'filter-to'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => {
        activityOffset = 0;
        loadActivityTab();
    });
});

document.getElementById('page-prev').addEventListener('click', () => {
    if (activityOffset >= PAGE_SIZE) {
        activityOffset -= PAGE_SIZE;
        loadActivityTab();
    }
});

document.getElementById('page-next').addEventListener('click', () => {
    if (activityOffset + PAGE_SIZE < activityTotal) {
        activityOffset += PAGE_SIZE;
        loadActivityTab();
    }
});

// ── Boot ───────────────────────────────────────────────────────────────────
// Restore tab from hash
(function restoreTab() {
    const hash = location.hash.replace('#', '');
    const valid = ['activity', 'storage'];
    if (valid.includes(hash)) activateTab(hash);
})();

init();
</script>
</body>
</html>
