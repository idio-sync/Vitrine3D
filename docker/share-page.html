<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} — {{SITE_NAME}}</title>

    <!-- OpenGraph (absolute URLs for crawlers) -->
    <meta property="og:type" content="video.other">
    <meta property="og:site_name" content="{{SITE_NAME}}">
    <meta property="og:url" content="{{SITE_URL}}/share/{{MEDIA_ID}}">
    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:image" content="{{THUMB_URL}}">
    <meta property="og:video" content="{{MP4_URL}}">
    <meta property="og:video:type" content="video/mp4">
    <meta property="og:video:width" content="1280">
    <meta property="og:video:height" content="720">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="player">
    <meta name="twitter:title" content="{{TITLE}}">
    <meta name="twitter:description" content="{{DESCRIPTION}}">
    <meta name="twitter:image" content="{{THUMB_URL}}">
    <meta name="twitter:player" content="{{SITE_URL}}/share/{{MEDIA_ID}}">
    <meta name="twitter:player:width" content="1280">
    <meta name="twitter:player:height" content="720">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a1929;
            color: #e8e0d4;
            font-family: 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Full-viewport video with info overlay at bottom */
        .video-stage {
            position: relative;
            width: 100%;
            flex: 1;
            min-height: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            display: block;
            width: 100%;
            height: 100vh;
            object-fit: contain;
            background: #000;
        }

        /* Bottom bar — sits over the video */
        .info-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background: linear-gradient(transparent, rgba(10, 25, 41, 0.85) 30%, rgba(10, 25, 41, 0.95));
            padding: 48px 24px 24px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            pointer-events: none;
        }

        .info-bar > * { pointer-events: auto; }

        .info-left {
            flex: 1;
            min-width: 0;
        }

        .site-name {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 10px;
            color: #fec03a;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 6px;
            opacity: 0.8;
        }

        .title {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.3;
            color: #f5f0e8;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .description {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 0.8rem;
            color: #8a9bb5;
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-primary,
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 4px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .btn-primary {
            background: #fec03a;
            color: #0a1929;
            border-color: #fec03a;
        }

        .btn-primary:hover {
            background: #ffe082;
            border-color: #ffe082;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #e8e0d4;
            border-color: rgba(254, 192, 58, 0.25);
        }

        .btn-secondary:hover {
            background: rgba(254, 192, 58, 0.15);
            border-color: rgba(254, 192, 58, 0.4);
        }

        /* Mobile */
        @media (max-width: 600px) {
            .info-bar {
                flex-direction: column;
                align-items: stretch;
                padding: 32px 16px 16px;
            }
            .title { font-size: 1rem; }
            .actions { justify-content: stretch; }
            .actions a { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="video-stage">
        <video
            src="{{MP4_REL}}"
            poster="{{THUMB_REL}}"
            controls
            autoplay
            muted
            loop
            playsinline
        ></video>
    </div>

    <div class="info-bar">
        <div class="info-left">
            <div class="site-name">{{SITE_NAME}}</div>
            <div class="title">{{TITLE}}</div>
            <div class="description">{{DESCRIPTION}}</div>
        </div>
        <div class="actions">
            {{VIEW_3D_LINK}}
            {{GIF_LINK}}
        </div>
    </div>
</body>
</html>
